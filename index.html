<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0e0e12;
    --surface: #17171f;
    --surface2: #1e1e28;
    --border: #2a2a38;
    --accent: #7c6aff;
    --accent2: #ff6ab0;
    --text: #f0f0f8;
    --muted: #6b6b80;
    --bubble-me: linear-gradient(135deg, #7c6aff, #a06aff);
    --bubble-them: #1e1e28;
    --radius: 18px;
  }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── JOIN SCREEN ── */
  #join-screen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    padding: 24px;
    background: radial-gradient(ellipse at 50% 40%, #1a1030 0%, var(--bg) 70%);
  }

  #join-screen h1 {
    font-size: 2rem;
    font-weight: 600;
    background: linear-gradient(135deg, #7c6aff, #ff6ab0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }

  #join-screen p {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 8px;
  }

  #join-screen input {
    width: 100%;
    max-width: 320px;
    padding: 14px 18px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  #join-screen input:focus { border-color: var(--accent); }

  #join-screen input::placeholder { color: var(--muted); }

  #join-btn {
    width: 100%;
    max-width: 320px;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), #a06aff);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-family: 'Sora', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  #join-btn:hover { opacity: 0.9; }
  #join-btn:active { transform: scale(0.98); }

  /* ── CHAT SCREEN ── */
  #chat-screen {
    display: none;
    flex-direction: column;
    height: 100dvh;
  }

  /* Header */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #header .title {
    font-weight: 600;
    font-size: 1rem;
    background: linear-gradient(135deg, #7c6aff, #ff6ab0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  #header .online {
    font-size: 0.72rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  #header .online::before {
    content: '';
    width: 7px; height: 7px;
    background: #4ade80;
    border-radius: 50%;
    display: inline-block;
  }

  #username-tag {
    font-size: 0.78rem;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-row {
    display: flex;
    flex-direction: column;
    max-width: 80%;
    animation: popIn 0.2s ease;
  }

  @keyframes popIn {
    from { opacity: 0; transform: translateY(6px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .msg-row.me { align-self: flex-end; align-items: flex-end; }
  .msg-row.them { align-self: flex-start; align-items: flex-start; }

  .msg-name {
    font-size: 0.68rem;
    color: var(--muted);
    margin-bottom: 3px;
    padding: 0 4px;
  }

  .msg-row.me .msg-name { color: #a06aff; }

  .bubble {
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 0.9rem;
    line-height: 1.5;
    word-break: break-word;
    position: relative;
  }

  .msg-row.me .bubble {
    background: var(--bubble-me);
    color: #fff;
    border-bottom-right-radius: 5px;
  }

  .msg-row.them .bubble {
    background: var(--bubble-them);
    color: var(--text);
    border-bottom-left-radius: 5px;
    border: 1px solid var(--border);
  }

  .msg-time {
    font-size: 0.62rem;
    color: var(--muted);
    margin-top: 3px;
    padding: 0 4px;
  }

  /* System message */
  .sys-msg {
    text-align: center;
    font-size: 0.72rem;
    color: var(--muted);
    padding: 4px 0;
    align-self: center;
  }

  /* Input bar */
  #input-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  #msg-input {
    flex: 1;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
    max-height: 120px;
    overflow-y: auto;
    line-height: 1.4;
  }

  #msg-input:focus { border-color: var(--accent); }
  #msg-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), #a06aff);
    border: none;
    border-radius: 50%;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
  }

  #send-btn:hover { opacity: 0.85; }
  #send-btn:active { transform: scale(0.93); }

  #send-btn svg { width: 18px; height: 18px; }

  /* Firebase config warning */
  #config-warning {
    background: #2a1a10;
    border: 1px solid #ff6a2a55;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 0.78rem;
    color: #ff9a6a;
    text-align: center;
    max-width: 320px;
    line-height: 1.5;
  }

  #config-warning code {
    background: #1a1008;
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 0.75rem;
  }
</style>
</head>
<body>

<!-- JOIN SCREEN -->
<div id="join-screen">
  <h1>💬 YapRoom</h1>
  <p>No acc needed. Just pick a name.</p>

  <input id="name-input" type="text" placeholder="Your name..." maxlength="20" autocomplete="off" />
  <button id="join-btn">Join Chat</button>
</div>

<!-- CHAT SCREEN -->
<div id="chat-screen">
  <div id="header">
    <div>
      <div class="title">YapRoom</div>
      <div class="online" id="online-count">1 online</div>
    </div>
    <div id="username-tag"></div>
  </div>

  <div id="messages"></div>

  <div id="input-bar">
    <textarea id="msg-input" placeholder="Message..." rows="1"></textarea>
    <button id="send-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<!-- Firebase SDKs -->
<script type="module">
  // ──────────────────────────────────────────────
  // 🔥 PASTE YOUR FIREBASE CONFIG HERE
  // ──────────────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyB9pyveXTlVP3sI9XH3l9zaEpD63Y45_JI",
    authDomain: "tictactoe-online-ffa4e.firebaseapp.com",
    databaseURL: "https://tictactoe-online-ffa4e-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "tictactoe-online-ffa4e",
    storageBucket: "tictactoe-online-ffa4e.firebasestorage.app",
    messagingSenderId: "578265553256",
    appId: "1:578265553256:web:fccfa5f6805abfa308dedd"
  };
  // ──────────────────────────────────────────────

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, serverTimestamp, set, onDisconnect, get }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  const messagesRef = ref(db, 'messages');
  const onlineRef   = ref(db, 'online');

  let myName = '';

  // ── Helpers ──
  function fmt(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  // ── Join ──
  document.getElementById('join-btn').addEventListener('click', join);
  document.getElementById('name-input').addEventListener('keydown', e => { if (e.key === 'Enter') join(); });

  function join() {
    const name = document.getElementById('name-input').value.trim();
    if (!name) return;
    myName = name;

    // Mark online (remove on disconnect)
    const myOnlineRef = ref(db, 'online/' + name.replace(/\s/g, '_') + '_' + Date.now());
    set(myOnlineRef, true);
    onDisconnect(myOnlineRef).remove();

    // Count online
    onValue(onlineRef, snap => {
      const count = snap.exists() ? Object.keys(snap.val()).length : 0;
      document.getElementById('online-count').textContent = count + ' online';
    });

    // System join message
    push(messagesRef, { type: 'system', text: `${myName} joined`, ts: serverTimestamp() });

    document.getElementById('join-screen').style.display = 'none';
    const cs = document.getElementById('chat-screen');
    cs.style.display = 'flex';
    document.getElementById('username-tag').textContent = myName;
    document.getElementById('msg-input').focus();

    listenMessages();
  }

  // ── Listen ──
  let firstLoad = true;
  function listenMessages() {
    onValue(messagesRef, snap => {
      const msgs = document.getElementById('messages');
      msgs.innerHTML = '';
      if (!snap.exists()) return;

      snap.forEach(child => {
        const m = child.val();
        if (m.type === 'system') {
          const el = document.createElement('div');
          el.className = 'sys-msg';
          el.textContent = m.text;
          msgs.appendChild(el);
        } else {
          const isMe = m.name === myName;
          const row = document.createElement('div');
          row.className = 'msg-row ' + (isMe ? 'me' : 'them');

          const nameEl = document.createElement('div');
          nameEl.className = 'msg-name';
          nameEl.textContent = isMe ? 'You' : m.name;

          const bubble = document.createElement('div');
          bubble.className = 'bubble';
          bubble.textContent = m.text;

          const time = document.createElement('div');
          time.className = 'msg-time';
          time.textContent = fmt(m.ts);

          row.appendChild(nameEl);
          row.appendChild(bubble);
          row.appendChild(time);
          msgs.appendChild(row);
        }
      });

      msgs.scrollTop = msgs.scrollHeight;
      firstLoad = false;
    });
  }

  // ── Send ──
  function sendMsg() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !myName) return;
    push(messagesRef, { name: myName, text, ts: serverTimestamp() });
    input.value = '';
    input.style.height = 'auto';
    input.focus();
  }

  document.getElementById('send-btn').addEventListener('click', sendMsg);
  document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  });
  document.getElementById('msg-input').addEventListener('input', function() { autoResize(this); });
</script>
</body>
</html>
